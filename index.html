<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haus - Remake Report 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1e3c;--blue:#1d4ed8;--blue-l:#dbeafe;
  --teal:#0d9488;--teal-l:#ccfbf1;
  --orange:#c2410c;--org-l:#ffedd5;
  --violet:#6d28d9;--vio-l:#ede9fe;
  --green:#15803d;--green-l:#dcfce7;
  --gray:#475569;--gray-l:#f8fafc;
  --line:#e2e8f0;--text:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--text);font-size:13px;line-height:1.6}
body.ko{font-family:'Noto Sans KR','Inter',sans-serif}
@media print{
  body{background:white}
  .page{page-break-after:always;box-shadow:none;margin:0;border-radius:0}
  .no-print{display:none!important}
  .detail-section{display:block!important}
  @page{size:A4 landscape;margin:10mm}
}
.wrap{max-width:1280px;margin:0 auto;padding:20px}

/* 언어 토글 */
.lang-toolbar{
  position:sticky;top:0;z-index:100;
  display:flex;justify-content:flex-end;align-items:center;gap:10px;
  padding:12px 0;margin-bottom:8px;
}
.lang-toggle{
  display:inline-flex;background:white;border:1.5px solid var(--line);
  border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.lang-btn{
  padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;
  background:white;border:none;color:var(--gray);font-family:inherit;transition:all .15s;
}
.lang-btn.active{background:var(--navy);color:white}
.tool-btn{
  padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;
  background:white;color:var(--navy);border:1.5px solid var(--line);
  border-radius:10px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.tool-btn:hover{background:var(--gray-l)}

.page{background:white;border-radius:12px;box-shadow:0 2px 20px rgba(0,0,0,.08);margin-bottom:28px;overflow:hidden}

/* Cover */
.cover{background:var(--navy);display:grid;grid-template-columns:1fr 1fr;min-height:560px}
.cl{padding:48px 44px;display:flex;flex-direction:column;justify-content:space-between}
.badge-cover{display:inline-block;background:var(--blue);color:white;font-size:10px;font-weight:700;letter-spacing:.12em;padding:5px 14px;border-radius:20px;margin-bottom:18px;width:fit-content}
.cover-title{font-size:30px;font-weight:900;color:white;line-height:1.3;margin-bottom:10px}
.cover-sub{font-size:13px;color:#94a3b8;margin-bottom:28px;line-height:1.7}
.cover-meta{font-size:11px;color:#64748b;line-height:1.8}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px}
.kpi{padding:16px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
.kpi-l{font-size:10px;color:#94a3b8;margin-bottom:4px;font-weight:500;letter-spacing:.04em}
.kpi-v{font-size:23px;font-weight:900;color:white;line-height:1.1}
.kpi-s{font-size:10px;color:#64748b;margin-top:3px}
.cr{background:linear-gradient(135deg,#162040,#0f1e3c);padding:44px 38px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid rgba(255,255,255,.06)}
.toc-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:#64748b;text-transform:uppercase;margin-bottom:18px}
.toc-item{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.toc-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);width:24px;flex-shrink:0}
.toc-text{font-size:12px;color:#cbd5e1}

.ch-hdr{background:var(--navy);padding:18px 32px;display:flex;align-items:center;gap:16px}
.ch-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.08em;flex-shrink:0}
.ch-title{font-size:18px;font-weight:700;color:white}
.ch-bar{width:3px;height:28px;background:var(--blue);border-radius:2px;flex-shrink:0}
.body{padding:26px 30px}

.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.mc{background:var(--gray-l);border-radius:10px;padding:15px 18px;border-left:3px solid transparent}
.mc.blue{border-left-color:var(--blue);background:var(--blue-l)}
.mc.teal{border-left-color:var(--teal);background:var(--teal-l)}
.mc.orange{border-left-color:var(--orange);background:var(--org-l)}
.mc.violet{border-left-color:var(--violet);background:var(--vio-l)}
.ml{font-size:10px;color:var(--gray);font-weight:500;letter-spacing:.03em;margin-bottom:4px}
.mv{font-size:25px;font-weight:900;color:var(--text);line-height:1.1}
.ms{font-size:10px;color:var(--gray);margin-top:3px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:18px}
.sec{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.06em;text-transform:uppercase;padding-bottom:8px;border-bottom:2px solid var(--line);margin-bottom:14px}

table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:var(--navy);color:white;font-weight:600;font-size:11px;padding:9px 12px;text-align:left;white-space:nowrap}
table.dt td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.dt tr:nth-child(even) td{background:var(--gray-l)}
table.dt tr.tot td{background:#eef2ff;font-weight:700;border-bottom:none}
table.dt.teal th{background:var(--teal)}
table.dt.orange th{background:var(--orange)}

ul.bars{list-style:none}
.bar-item{display:grid;grid-template-columns:150px 1fr 34px;align-items:center;gap:10px;padding:4px 0}
.bl{font-size:11.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt{background:var(--gray-l);border-radius:3px;height:13px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.bn{font-size:11px;font-weight:700;color:var(--gray);text-align:right}

.ib{border-radius:10px;padding:15px 18px;margin-top:14px}
.ib.teal{background:var(--teal-l);border-left:3px solid var(--teal)}
.ib.orange{background:var(--org-l);border-left:3px solid var(--orange)}
.ib.blue{background:var(--blue-l);border-left:3px solid var(--blue)}
.ib.violet{background:var(--vio-l);border-left:3px solid var(--violet)}
.it{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:8px}
.ib.orange .it{color:var(--orange)}.ib.blue .it{color:var(--blue)}.ib.violet .it{color:var(--violet)}
.ii{font-size:11.5px;color:var(--text);padding:2px 0 2px 12px;position:relative;line-height:1.6}
.ii::before{content:'•';position:absolute;left:0;color:var(--teal);font-weight:700}
.ib.orange .ii::before{color:var(--orange)}.ib.blue .ii::before{color:var(--blue)}.ib.violet .ii::before{color:var(--violet)}

.pie-wrap{display:flex;align-items:center;gap:22px;margin-bottom:16px}
.pie-leg{flex:1}
.pie-li{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.pie-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;gap:3px}
.our,.resp-our{background:#fee2e2;color:#991b1b}
.cust,.resp-cust{background:#dbeafe;color:#1e40af}
.oth,.resp-oth{background:#f1f5f9;color:#475569}
.ship,.resp-ship{background:#cffafe;color:#155e75}
.ins-y{background:#d1fae5;color:#065f46}
.ins-dig{background:#ede9fe;color:#4c1d95}
.ins-n{background:#f1f5f9;color:#6b7280}

/* Resolution detail (CH05) */
.reason-card{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
.reason-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;cursor:pointer}
.rh-bar{width:6px;align-self:stretch;min-height:48px}
.rh-main{padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rh-reason{font-size:14px;font-weight:700;color:var(--navy)}
.rh-badges{display:flex;gap:5px;flex-wrap:wrap}
.rh-cnt{padding:12px 18px;font-size:12px;font-weight:700;color:var(--gray);white-space:nowrap;display:flex;align-items:center;gap:6px}
.rh-toggle{font-size:11px;transition:transform .2s}
.rh-toggle.open{transform:rotate(180deg)}
.detail-section{display:none}
.detail-section.open{display:block}
.ct-wrap{overflow-x:auto}
table.ct{width:100%;border-collapse:collapse;font-size:11.5px}
table.ct th{background:#f8fafc;color:var(--gray);font-size:10px;font-weight:700;padding:8px 12px;text-align:left;border-bottom:2px solid var(--line);white-space:nowrap}
table.ct td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.5}
table.ct tr:last-child td{border-bottom:none}
table.ct tr:hover td{background:#fafbff}
.mono{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--blue);font-weight:500}
.exp-cell{font-size:11px;color:var(--gray);max-width:300px}
.res-cell{font-size:11px;color:var(--text);max-width:260px}
.ins-amt{font-weight:700;color:var(--teal)}
.pattern-summary{background:var(--gray-l);border-top:1px solid var(--line);padding:13px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pattern-item{background:white;border-radius:8px;padding:9px 13px;border-left:3px solid var(--blue)}
.pattern-num{font-size:9.5px;font-weight:700;color:var(--blue);margin-bottom:3px;letter-spacing:.04em}
.pattern-text{font-size:11px;color:var(--text)}

.final-box{border-radius:12px;padding:18px 20px;margin-bottom:12px;border:1px solid transparent}
.final-box.a{background:var(--org-l);border-color:#fed7aa}
.final-box.b{background:var(--blue-l);border-color:#bfdbfe}
.final-box.c{background:var(--teal-l);border-color:#99f6e4}
.final-box.d{background:var(--gray-l);border-color:var(--line)}
.ft{font-size:13px;font-weight:700;margin-bottom:8px}
.final-box.a .ft{color:var(--orange)}.final-box.b .ft{color:var(--blue)}.final-box.c .ft{color:var(--teal)}.final-box.d .ft{color:var(--gray)}
.fitem{font-size:11.5px;color:var(--text);padding-left:14px;position:relative;line-height:1.6;margin-bottom:3px}
.fitem::before{content:'\2192';position:absolute;left:0;opacity:.5}

.stacked-bar{display:flex;height:26px;border-radius:6px;overflow:hidden;margin-bottom:6px}
.stacked-seg{display:flex;align-items:center;justify-content:center;font-size:10px;color:white;font-weight:700}


.month-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:white;border-radius:12px;padding:14px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.mf-label{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.04em;text-transform:uppercase;margin-right:4px}
.mf-btn{padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--gray-l);color:var(--gray);border:1.5px solid transparent;border-radius:8px;font-family:inherit;transition:all .15s}
.mf-btn:hover{background:#e2e8f0}
.mf-btn.active{background:var(--navy);color:white;border-color:var(--navy)}
.mf-btn.ytd{background:var(--blue);color:white}
.mf-btn.ytd.active{background:var(--navy)}
/* 호버 팝업 (CH04 etc) */
.hoverable{position:relative;cursor:help;border-bottom:1px dashed var(--line)}
.hover-pop{display:none;position:absolute;z-index:200;left:0;top:100%;margin-top:6px;background:white;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:14px 16px;width:340px;font-size:11.5px;line-height:1.6;color:var(--text)}
.hoverable:hover .hover-pop{display:block}
.hover-pop .hp-row{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--gray-l)}
.hover-pop .hp-row:last-child{border-bottom:none}
.hover-pop .hp-k{font-weight:700;color:var(--gray);min-width:74px;flex-shrink:0}
.hover-pop .hp-v{color:var(--text)}
.hover-pop .hp-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.hp-cases{max-height:300px;overflow-y:auto}
.hp-case{padding:8px 0;border-bottom:1px solid var(--gray-l)}
.hp-case:last-child{border-bottom:none}
.hp-case-head{display:flex;gap:6px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.foot{text-align:center;padding:14px;font-size:10.5px;color:#94a3b8;background:var(--navy);border-radius:12px;margin-top:4px}
.legend-row{display:flex;gap:14px;font-size:10.5px;color:var(--gray);margin-top:8px;flex-wrap:wrap}
.legend-row span{display:flex;align-items:center;gap:5px}
.legend-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap">

  <div class="lang-toolbar no-print">
    <button class="tool-btn" onclick="window.print()" data-i18n="print">Print / PDF</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">KO</button>
    </div>
  </div>

  <div id="month-filter" class="month-filter no-print"></div>

  <div id="report"></div>

  <div class="foot" id="footer"></div>
</div>

// Material short labels
function matLabel(m){
  if(!m) return "-";
  return m.replace("Explore-F (Haus Essential)","Explore-F").replace("Aidite 3D pro","Aidite 3D Pro").replace("Ti Disc","Ti Disc");
}

// ============ Aggregation (auto-calculated) ============
const MONTH_ORDER = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function agg(){
  const SRC = filteredCases();
  const A = {
    total: SRC.length,
    months: {}, monthList: [],
    reason: {}, responsibility:{Our:0,Customer:0,Other:0,Shipment:0,"N/A":0},
    restoration:{}, material:{},
    insurance:{Y:0,N:0,DIGITEC:0},
    insUsedCount:0, insUsedAmt:0,
    byReason:{},
    monthlyResp:{}, monthlyIns:{},
    customers:{}
  };
  SRC.forEach(c=>{
    // month
    const mo = c.month;
    A.months[mo] = (A.months[mo]||0)+1;
    // reason
    A.reason[c.reason] = (A.reason[c.reason]||0)+1;
    if(!A.byReason[c.reason]) A.byReason[c.reason]=[];
    A.byReason[c.reason].push(c);
    // responsibility
    let r = c.resp || "N/A";
    if(!["Our","Customer","Other","Shipment"].includes(r)) r="N/A";
    A.responsibility[r] = (A.responsibility[r]||0)+1;
    // restoration
    if(c.resto){ A.restoration[c.resto]=(A.restoration[c.resto]||0)+1;
      if(!A.byRestoration) A.byRestoration={};
      if(!A.byRestoration[c.resto]) A.byRestoration[c.resto]=[];
      A.byRestoration[c.resto].push(c);
      // material별 케이스도
    }
    const _ml0 = matLabel(c.mat);
    if(_ml0 && _ml0!=="-"){ if(!A.byMaterial) A.byMaterial={}; if(!A.byMaterial[_ml0]) A.byMaterial[_ml0]=[]; A.byMaterial[_ml0].push(c); }
    // material
    const ml = matLabel(c.mat);
    if(ml && ml!=="-") A.material[ml]=(A.material[ml]||0)+1;
    // insurance
    let ins = c.ins||"N";
    if(!["Y","N","DIGITEC"].includes(ins)) ins="N";
    A.insurance[ins]=(A.insurance[ins]||0)+1;
    if(c.amt!=null){A.insUsedCount++; A.insUsedAmt+=c.amt;}
    // monthly resp/ins
    if(!A.monthlyResp[mo]) A.monthlyResp[mo]={Our:0,Customer:0,Other:0,Shipment:0,"N/A":0};
    A.monthlyResp[mo][r]=(A.monthlyResp[mo][r]||0)+1;
    if(!A.monthlyIns[mo]) A.monthlyIns[mo]={Y:0,N:0,DIGITEC:0,amt:0};
    A.monthlyIns[mo][ins]=(A.monthlyIns[mo][ins]||0)+1;
    if(c.amt!=null) A.monthlyIns[mo].amt+=c.amt;
    // customers
    const cust = c.cust.trim();
    if(cust) A.customers[cust]=(A.customers[cust]||0)+1;
  });
  A.monthList = Object.keys(A.months).filter(m=>MONTH_ORDER.includes(m)).sort((a,b)=>MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b));
  return A;
}

// helpers
function pct(n,d){ return d>0 ? Math.round(n/d*100) : 0; }
function sortedEntries(obj){ return Object.entries(obj).sort((a,b)=>b[1]-a[1]); }
function respClass(r){ if(r==="Our")return"resp-our"; if(r==="Customer")return"resp-cust"; if(r==="Shipment")return"resp-ship"; return"resp-oth"; }
function insClass(i){ if(i==="Y")return"ins-y"; if(i==="DIGITEC")return"ins-dig"; return"ins-n"; }

function setLang(l){

function casePopup(cases, title){
  const L = t();
  let h = `<div class="hover-pop"><div class="hp-title">${title} \u00b7 ${cases.length} ${L.caseUnit}</div><div class="hp-cases">`;
  cases.forEach(c=>{
    const rc = respClass(c.resp||"N/A");
    const expTxt = (LANG==='ko' && c.exp_ko) ? c.exp_ko : (c.exp||"-");
    const resTxt = (LANG==='ko' && c.res_ko) ? c.res_ko : (c.res||"-");
    h += `<div class="hp-case"><div class="hp-case-head"><span class="mono">#${c.no}</span> <b style="font-size:11px">${c.cust}</b> <span class="bdg ${rc}" style="font-size:9px">${c.resp||"-"}</span> <span style="font-size:10px;color:var(--gray)">${c.date||""}</span></div>`;
    h += `<div class="hp-row"><span class="hp-k">${L.thReason}</span><span class="hp-v">${LANG==='ko'&&REASON_META[c.reason]?REASON_META[c.reason].ko:c.reason}</span></div>`;
    h += `<div class="hp-row"><span class="hp-k">${L.thReasonExp}</span><span class="hp-v">${expTxt}</span></div>`;
    h += `<div class="hp-row"><span class="hp-k">${L.thResolution}</span><span class="hp-v">${resTxt}</span></div>`;
    h += `</div>`;
  });
  h += `</div></div>`;
  return h;
}

      const rc=respClass(c.resp||"N/A");
      const ic=insClass(c.ins||"N");
      const amtStr=c.amt!=null?`<span class="ins-amt">&nbsp;$${c.amt}</span>`:"";
      const expTxt = (LANG==='ko' && c.exp_ko) ? c.exp_ko : (c.exp||"-");
      const resTxt = (LANG==='ko' && c.res_ko) ? c.res_ko : (c.res||"-");
      html+=`<tr><td><span class="mono">#${c.no}</span></td><td style="font-weight:500;min-width:130px">${c.cust}</td><td style="min-width:90px;color:var(--gray)">${c.resto||"-"}</td><td style="min-width:90px;color:var(--gray)">${matLabel(c.mat)}</td><td><span class="bdg ${rc}">${c.resp||"-"}</span></td><td><span class="bdg ${ic}">${c.ins||"N"}</span>${amtStr}</td><td class="exp-cell">${expTxt||"-"}</td><td class="res-cell">${resTxt||"-"}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
    if(patterns.length){ html+=`<div class="pattern-summary">${patterns.map((p,i)=>`<div class="pattern-item"><div class="pattern-num">${L.pattern} ${i+1}</div><div class="pattern-text">${p}</div></div>`).join("")}</div>`; }
    html+=`</div></div>`;
  });
  html+=`<div class="ib teal" style="margin-top:16px"><div class="it">${L.insResolutionTitle}</div>${L.insResolution.map(s=>`<div class="ii">${s}</div>`).join("")}</div>`;
  html+=`</div></div>`;

  // ===== CH06 INSURANCE =====
  html += `<div class="page"><div class="ch-hdr"><div class="ch-bar" style="background:var(--teal)"></div><span class="ch-num">CHAPTER 06</span><span class="ch-title">${L.ch06}</span></div><div class="body">`;
  html += `<div class="mrow"><div class="mc teal"><div class="ml">${L.insLabelY}</div><div class="mv">${D.insurance.Y}</div><div class="ms">${pct(D.insurance.Y,D.total)}% of total</div></div><div class="mc" style="background:#f1f5f9;border-left:3px solid #64748b"><div class="ml">${L.insLabelN}</div><div class="mv">${D.insurance.N}</div><div class="ms">${pct(D.insurance.N,D.total)}% of total</div></div><div class="mc blue"><div class="ml">DIGITEC</div><div class="mv">${D.insurance.DIGITEC}</div><div class="ms">${pct(D.insurance.DIGITEC,D.total)}% of total</div></div><div class="mc orange"><div class="ml">${L.insAmtUsed}</div><div class="mv">$${D.insUsedAmt}</div><div class="ms">${D.insUsedCount} ${L.cases} / avg $${Math.round(D.insUsedAmt/D.insUsedCount)}</div></div></div>`;
  html += `<div class="two"><div>`;
  html += `<div class="sec">${L.insOverview}</div><table class="dt teal"><thead><tr><th>${L.thType}</th><th>${L.thTotal}</th>${D.monthList.map(m=>`<th>${m}</th>`).join("")}<th>${L.thRatio}</th></tr></thead><tbody>`;
  [["Y",L.insLabelY],["N",L.insLabelN],["DIGITEC","DIGITEC"]].forEach(([k,lab])=>{
    html+=`<tr><td>${lab}</td><td><b>${D.insurance[k]}</b></td>${D.monthList.map(m=>`<td>${D.monthlyIns[m][k]}</td>`).join("")}<td>${pct(D.insurance[k],D.total)}%</td></tr>`;
  });
  html+=`<tr class="tot"><td>${L.total}</td><td>${D.total}</td>${D.monthList.map(m=>`<td>${D.months[m]}</td>`).join("")}<td>100%</td></tr></tbody></table>`;
  // monthly Y vs DIGITEC bar
  html+=`<div class="sec" style="margin-top:16px">${L.monthlyYvsDig}</div><div style="display:flex;gap:12px">`;
  const maxIns=Math.max(...D.monthList.map(m=>Math.max(D.monthlyIns[m].Y,D.monthlyIns[m].DIGITEC)),1);
  D.monthList.forEach(m=>{
    const mi=D.monthlyIns[m];
    html+=`<div style="flex:1;text-align:center"><div style="font-size:10px;color:var(--gray);margin-bottom:4px">${m}</div><div style="display:flex;gap:4px;justify-content:center;align-items:flex-end;height:70px"><div style="width:26px;background:var(--teal);height:${Math.max(mi.Y/maxIns*70,4)}px;border-radius:3px 3px 0 0;display:flex;align-items:flex-start;justify-content:center;font-size:9px;color:white;padding-top:1px">${mi.Y}</div><div style="width:26px;background:var(--blue);height:${Math.max(mi.DIGITEC/maxIns*70,4)}px;border-radius:3px 3px 0 0;display:flex;align-items:flex-start;justify-content:center;font-size:9px;color:white;padding-top:1px">${mi.DIGITEC}</div></div><div style="font-size:9px;color:${mi.amt>200?'var(--orange)':'var(--gray)'};font-weight:${mi.amt>200?'700':'400'};margin-top:2px">$${mi.amt}</div></div>`;
  });
  html+=`</div><div class="legend-row"><span><span class="legend-dot" style="background:var(--teal)"></span>Y</span><span><span class="legend-dot" style="background:var(--blue)"></span>DIGITEC</span></div>`;
  html+=`<div class="ib teal"><div class="it">${L.insInsuranceTitle}</div>${L.insInsurance.map(s=>`<div class="ii">${s}</div>`).join("")}</div>`;
  html+=`</div><div>`;
  // insurance Y detail
  html+=`<div class="sec">${L.insYDetail} (${D.insUsedCount} ${L.cases} / $${D.insUsedAmt})</div><table class="dt" style="font-size:11px"><thead><tr><th>${L.thCustomer}</th><th>Order#</th><th>${L.thReason}</th><th>${L.thResp}</th><th>${L.thAmt}</th></tr></thead><tbody>`;
  const insUsedCases=CASES.filter(c=>c.amt!=null);
  insUsedCases.forEach(c=>{
    const rc=respClass(c.resp||"N/A");
    html+=`<tr><td>${c.cust}</td><td class="mono">#${c.no}</td><td>${c.reason}</td><td><span class="bdg ${rc}">${c.resp||"-"}</span></td><td style="font-weight:700;${c.amt>=100?'color:var(--orange)':''}">$${c.amt}</td></tr>`;
  });
  html+=`<tr class="tot"><td colspan="4"><b>${L.total}</b></td><td><b>$${D.insUsedAmt}</b></td></tr></tbody></table>`;
  html+=`</div></div></div></div>`;

  // ===== CH07 CUSTOMERS =====
  html += `<div class="page"><div class="ch-hdr"><div class="ch-bar" style="background:var(--blue)"></div><span class="ch-num">CHAPTER 07</span><span class="ch-title">${L.ch07}</span></div><div class="body"><div class="two"><div>`;
  html+=`<div class="sec">${L.remakeByCustomer}</div><ul class="bars">`;
  const custMax=custSorted[0][1];
  custSorted.forEach(([name,v],i)=>{
    const col = i<2?"var(--navy)":i<7?"var(--blue)":v>=3?"#93c5fd":"#bfdbfe";
    const wt = i<7?"font-weight:600;":"";
    html+=`<li class="bar-item" style="grid-template-columns:180px 1fr 34px"><span class="bl" style="${wt}">${i+1}. ${name}</span><div class="bt"><div class="bf" style="width:${v/custMax*100}%;background:${col}"></div></div><span class="bn">${v}</span></li>`;
  });
  html+=`</ul></div><div>`;
  html+=`<div class="sec">${L.rankingDetail}</div><table class="dt blue"><thead><tr><th>${L.thRank}</th><th>${L.thCustomer}</th><th>${L.thCases}</th><th>${L.thRatio}</th></tr></thead><tbody>`;
  custSorted.forEach(([name,v],i)=>{ html+=`<tr><td>${i+1}</td><td${i<7?' style="font-weight:600"':''}>${name}</td><td><b>${v}</b></td><td>${(v/D.total*100).toFixed(1)}%</td></tr>`; });
  html+=`</tbody></table>`;
  html+=`<div class="ib blue"><div class="it">${L.insCustomerTitle}</div>${L.insCustomer.map(s=>`<div class="ii">${tpl(s)}</div>`).join("")}</div>`;
  html+=`</div></div></div></div>`;

  // ===== CH08 INSIGHTS =====
  html += `<div class="page"><div class="ch-hdr"><div class="ch-bar" style="background:#f59e0b"></div><span class="ch-num">CHAPTER 08</span><span class="ch-title">${L.ch08}</span></div><div class="body"><div class="two">`;
  html+=`<div>`;
  L.finals.slice(0,2).forEach(f=>{ html+=`<div class="final-box ${f.cls}"><div class="ft">${f.title}</div>${f.items.map(it=>`<div class="fitem">${tpl(it)}</div>`).join("")}</div>`; });
  html+=`</div><div>`;
  L.finals.slice(2).forEach(f=>{ html+=`<div class="final-box ${f.cls}"><div class="ft">${f.title}</div>${f.items.map(it=>`<div class="fitem">${tpl(it)}</div>`).join("")}</div>`; });
  html+=`</div></div>`;
  // key metrics
  const km=[[D.total,L.kmTotal,"white"],[pct(D.responsibility.Our,D.total)+"%",L.kmOur,"#f87171"],["+"+marPct+"%",L.kmMar,"#60a5fa"],["$"+D.insUsedAmt,L.kmIns,"#34d399"],[D.insurance.DIGITEC,L.kmDig,"#a78bfa"],[top7pct+"%",L.kmTop7,"#fbbf24"]];
  html+=`<div style="background:var(--navy);border-radius:10px;padding:18px 22px;margin-top:18px"><div style="font-size:11px;font-weight:700;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px">${L.keyMetrics}</div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px">`;
  km.forEach(([v,l,c])=>{ html+=`<div style="text-align:center"><div style="font-size:22px;font-weight:900;color:${c}">${v}</div><div style="font-size:9px;color:#64748b;margin-top:2px">${l}</div></div>`; });
  html+=`</div></div>`;
  html+=`</div></div>`;

  document.getElementById('report').innerHTML = html;
  document.getElementById('footer').innerHTML = L.footer;
  renderMonthFilter();
}

function renderMonthFilter(){
  const L = t();
  // 전체 CASES에서 존재하는 월 목록 추출 (정렬)
  const monthsPresent = [...new Set(CASES.map(c=>c.month))].filter(m=>MONTH_ORDER.includes(m)).sort((a,b)=>MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b));
  let h = `<span class="mf-label">${L.monthFilterLabel}</span>`;
  h += `<button class="mf-btn ytd ${MONTH_FILTER==='YTD'?'active':''}" onclick="setMonth('YTD')">${L.allMonths}</button>`;
  monthsPresent.forEach(m=>{
    h += `<button class="mf-btn ${MONTH_FILTER===m?'active':''}" onclick="setMonth('${m}')">${m}</button>`;
  });
  document.getElementById('month-filter').innerHTML = h;
}

function toggleR(id){
  document.getElementById('dt-'+id).classList.toggle('open');
  document.getElementById('tg-'+id).classList.toggle('open');
}
function expandAll(){ document.querySelectorAll('.detail-section').forEach(e=>e.classList.add('open')); document.querySelectorAll('.rh-toggle').forEach(e=>e.classList.add('open')); }
function collapseAll(){ document.querySelectorAll('.detail-section').forEach(e=>e.classList.remove('open')); document.querySelectorAll('.rh-toggle').forEach(e=>e.classList.remove('open')); }

// init - default EN
render();
</script>
